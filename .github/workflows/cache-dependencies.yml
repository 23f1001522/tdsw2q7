name: Cache Dependencies Example

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Restore or create cache
      - name: Restore cache
        id: prime-cache-41eebc2
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache
          key: cache-41eebc2

      # Step 3: Install Node.js dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Show cache hit/miss
      - name: Show cache result
        run: |
          if [ "${{ steps.prime-cache-41eebc2.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit: true"
          else
            echo "Cache hit: false"
          fi
